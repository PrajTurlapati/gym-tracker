<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Tracker</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="images/AppIcon.png">
<link rel="apple-touch-icon" href="images/AppIcon.png">
<meta name="theme-color" content="#4e4e54">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym Tracker">
</head>
<body>
<div class="app">
  <header class="app-header">
    <h1>Workouts</h1>
    <div class="header-controls">
      <select id="day-select"></select>
      <button id="history-toggle" class="ghost-btn">History</button>
    </div>
  </header>

  <div id="day-panel"></div>

  <div id="history-panel" class="history-panel hidden">
    <div class="history-panel-header">
      <h2>History</h2>
      <div class="history-header-actions">
        <button id="new-folder-btn" class="ghost-btn">+ New Folder</button>
        <button id="history-close" class="ghost-btn">Close</button>
      </div>
    </div>
    <div id="new-folder-form" class="inline-form hidden">
      <input type="text" id="new-folder-input" placeholder="Folder name (e.g. Week of Jul 20)" />
      <button id="new-folder-confirm" class="ghost-btn small">Add</button>
      <button id="new-folder-cancel" class="ghost-btn small">Cancel</button>
    </div>
    <div id="history-list"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
